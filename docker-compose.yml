version: "3.9"

services:

  mqtt:
    image: eclipse-mosquitto
    container_name: usp-mqtt
    volumes:
      - ./docker/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - ./certs:/mosquitto/certs
    ports:
      - "1883:1883"
      - "8883:8883"

  controller:
    build: ./docker/controller
    container_name: usp-controller
    depends_on:
      - mqtt
    volumes:
      - ./docker/controller/controller.conf:/config/controller.conf
      - ./certs:/certs
    ports:
      - "9001:9001"